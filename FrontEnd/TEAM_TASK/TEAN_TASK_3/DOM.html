<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Tasks</title>
</head>
<body>

    <!-- TASK 1 -->
    <h1>TASK 1</h1>
    <h2>Enter Student Mark</h2>
    <input type="number" id="studentMark">
    <button onclick="check()">Check</button>
    <p id="show"></p>

    <hr>

    <!-- TASK 2 -->
    <h1>TASK 2</h1>
    <h2>Odd or Even</h2>
    <input type="number" id="oddEven">
    <button onclick="oddOrEven()">Check</button>
    <p id="ans"></p>

    <hr>

    <!-- TASK 4 -->
    <h1>TASK 4</h1>
    <h2>Highest Collection</h2>
    <p id="highestResult"></p>

    <hr>

    <!-- TASK 6 -->
    <h1>TASK 6</h1>
    <h2>Welcome App</h2>
    <input type="text" id="welcomeName" placeholder="Enter your name">
    <button onclick="showWelcome()">Show Welcome</button>
    <h2 id="welcomeMessage"></h2>

    <hr>

    <!-- TASK 7 -->
    <h1>TASK 7</h1>

    <input
        type="text"
        id="loginUsername"
        placeholder="Enter Username"
    >

    <br><br>

    <input
        type="password"
        id="password"
        placeholder="Enter Password"
        onkeyup="checkPassword()"
    >

    <p id="passwordResult"></p>

    <button onclick="login()">Login</button>

    <h2 id="loginResult"></h2>

    <hr>

    <!-- TASK 8 -->
    <h1>TASK 8</h1>

    <p class="hide" style="display:flex;">
        Lorem ipsum dolor sit amet consectetur adipisicing elit.
    </p>

    <button onclick="hideText()">Hide</button>
    <button onclick="showText()">Show</button>

    <hr>

    <!-- TASK 9 -->
    <h1>TASK 9</h1>

    <h1 id="task9Headind">This is Task 9</h1>

    <button onclick="changeColour()">
        Click me to change colors
    </button>

    <hr>

    <!-- TASK 10 -->
    <h1>TASK 10</h1>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="email" id="email" placeholder="Enter Email">
    <input type="number" id="age" placeholder="Enter Age">

    <button onclick="register()">Register</button>

    <div id="card"></div>

    <hr>

    <!-- BONUS TASK -->
    <h1>BONUS TASK</h1>

    <form id="form">

        <h2>Register</h2>

        <input
            type="text"
            id="regName"
            placeholder="Enter Name"
        >

        <input
            type="password"
            id="regPass"
            placeholder="Enter Password"
        >

        <button
            type="button"
            onclick="registerUser(event)"
        >
            Register
        </button>

        <h2>Login</h2>

        <input
            type="text"
            id="loginName"
            placeholder="Enter Name"
        >

        <input
            type="password"
            id="loginPass"
            placeholder="Enter Password"
        >

        <button
            type="button"
            onclick="loginUser(event)"
        >
            Login
        </button>

        <button
            type="button"
            onclick="logoutUser(event)"
        >
            Logout
        </button>

        <h2 id="message"></h2>

    </form>

    <script>

        // TASK 1
        const check = () => {
            const mark = document.getElementById("studentMark").value;
            const grade = document.getElementById("show");

            if (mark >= 90 && mark <= 100) {
                grade.innerText = "Student Grade: A";
            }
            else if (mark >= 80) {
                grade.innerText = "Student Grade: B";
            }
            else if (mark >= 70) {
                grade.innerText = "Student Grade: C";
            }
            else if (mark >= 60) {
                grade.innerText = "Student Grade: D";
            }
            else if (mark >= 0) {
                grade.innerText = "Student Grade: Fail";
            }
            else {
                grade.innerText = "Invalid Mark";
            }
        }

        // TASK 2
        const oddOrEven = () => {
            const num = document.getElementById("oddEven").value;
            const ans = document.getElementById("ans");

            if (num % 2 === 0) {
                ans.innerText = "Number is Even";
            } else {
                ans.innerText = "Number is Odd";
            }
        }

        // TASK 4
        const highNum = [100, 500, 800, 200];

        const highest = highNum.reduce((acc, cur) => {
            return cur > acc ? cur : acc;
        });

        document.getElementById("highestResult").innerText = highest;

        // TASK 6
        const showWelcome = () => {
            const userName =
                document.getElementById("welcomeName").value;

            document.getElementById("welcomeMessage").innerText =`Welcome ${userName}`;
        }

        // TASK 7
        const checkPassword = () => {
            const password =
                document.getElementById("password").value;

            if (password.length >= 8) {
                document.getElementById("passwordResult").innerText =
                    "Strong Password";
            } else {
                document.getElementById("passwordResult").innerText =
                    "Weak Password";
            }
        }

        const login = () => {
            const username =
                document.getElementById("loginUsername").value;

            const password =
                document.getElementById("password").value;

            if (username === "admin" && password === "12345") {
                document.getElementById("loginResult").innerText =
                    "Login Success";
            } else {
                document.getElementById("loginResult").innerText =
                    "Invalid Login";
            }
        }

        // TASK 8
        const hideText = () => {
            document.querySelector(".hide").style.display = "none";
        }

        const showText = () => {
            document.querySelector(".hide").style.display = "flex";
        }

        // TASK 9
        const changeColour = () => {
            document.getElementById("task9Headind")
                .style.backgroundColor = "lightblue";

            document.getElementById("task9Headind")
                .style.color = "white";
        }

        // TASK 10
        const register = () => {
            const name =
                document.getElementById("name").value;

            const email =
                document.getElementById("email").value;

            const age =
                document.getElementById("age").value;

            document.getElementById("card").innerHTML =
                "<h2>User Details</h2>" +
                "<p>Name: " + name + "</p>" +
                "<p>Email: " + email + "</p>" +
                "<p>Age: " + age + "</p>";
        }

        // BONUS TASK
        let users = [];

        const registerUser = (event) => {
            event.preventDefault();

            const name =
                document.getElementById("regName").value;

            const password =
                document.getElementById("regPass").value;

            users.push({
                name: name,
                password: password
            });

            alert("User Registered Successfully");

            document.getElementById("form").reset();
        }

        const loginUser = (event) => {
            event.preventDefault();

            const name =
                document.getElementById("loginName").value;

            const password =
                document.getElementById("loginPass").value;

            const user = users.find(
                item =>
                    item.name === name &&
                    item.password === password
            );

            if (user) {
                document.getElementById("message").innerText =
                    "Welcome " + user.name;
            } else {
                document.getElementById("message").innerText =
                    "Invalid Credentials";
            }
        }

        const logoutUser = (event) => {
            event.preventDefault();

            document.getElementById("message").innerText =
                "Logged Out Successfully";
        }

    </script>

</body>
</html>
