<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <script src="../assets/js/registerLogin.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex justify-center items-center">

    <div class="w-[450px] p-10 rounded-3xl shadow-2xl border border-gray-200">

        <!-- Heading -->
        <h1 class="text-4xl font-bold text-center text-gray-800 mb-8">
            Registration Form
        </h1>

        <!-- First Name -->
        <div class="mb-5">
            <label class="block text-gray-700 mb-2 font-medium">
                First Name
            </label>

            <input
                type="text"
                placeholder="Enter First Name"
                class="w-full p-4 rounded-xl border border-gray-300 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition"
                id="fName"
                >
        </div>

        <!-- Last Name -->
        <div class="mb-5">
            <label class="block text-gray-700 mb-2 font-medium">
                Last Name
            </label>

            <input
                type="text"
                placeholder="Enter Last Name"
                class="w-full p-4 rounded-xl border border-gray-300 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition"
                id="lName"
                >
        </div>

        <!-- Username -->
        <div class="mb-5">
            <label class="block text-gray-700 mb-2 font-medium">
                Username
            </label>

            <input
                type="text"
                placeholder="Enter Username"
                class="w-full p-4 rounded-xl border border-gray-300 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition"
                id="userNameInp"
                >
        </div>

        <!-- Password -->
        <div class="mb-5">
            <label class="block text-gray-700 mb-2 font-medium">
                Password
            </label>

            <input
                type="password"
                placeholder="Enter Password"
                class="w-full p-4 rounded-xl border border-gray-300 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition"
                id="passInp"
                >
        </div>

        <!-- Date of Birth -->
        <div class="mb-8">
            <label class="block text-gray-700 mb-2 font-medium">
                Date of Birth
            </label>

            <input
                type="date"
                class="w-full p-4 rounded-xl border border-gray-300 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition"
                id="dobInp"
                >
        </div>

        <!-- Submit Button -->
        <button
            class="w-full bg-gray-800 text-white font-semibold py-4 rounded-xl hover:bg-gray-700 transition duration-300"
            onclick="register()"
            >
            Submit
        </button>

    </div>


    
</body>
</html>
