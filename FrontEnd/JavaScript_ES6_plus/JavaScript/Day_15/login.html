<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <script src="../assets/js/registerLogin.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex justify-center items-center">

    <div class="w-[450px] p-10 rounded-3xl shadow-2xl border border-gray-200">

        <!-- Heading -->
        <h1 class="text-4xl font-bold text-center text-gray-800 mb-8">
            Login
        </h1>

        <!-- Username -->
        <div class="mb-5">
            <label class="block text-gray-700 mb-2 font-medium">
                Username
            </label>

            <input
                type="text"
                id="loginUser"
                placeholder="Enter Username"
                class="w-full p-4 rounded-xl border border-gray-300 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition"
                id="loginInp"
                >
        </div>

        <!-- Password -->
        <div class="mb-8">
            <label class="block text-gray-700 mb-2 font-medium">
                Password
            </label>

            <input
                type="password"
                id="loginPass"
                placeholder="Enter Password"
                class="w-full p-4 rounded-xl border border-gray-300 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition"
                id="passInp"
                >
        </div>

        <!-- Login Button -->
        <button
            type="button"
            onclick="login()"
            class="w-full bg-gray-800 text-white font-semibold py-4 rounded-xl hover:bg-gray-700 transition duration-300"
        >
            Login
        </button>

    </div>

    
</body>
</html>
