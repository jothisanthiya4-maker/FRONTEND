<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Events</title>
</head>
<body>
    <center style="display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px;">

        <h1>DOM Events</h1>

        <!-- task 1 -->

        <h2 id="h2"></h2>

        <input type="text" id="inp1" placeholder="enter hero name">

        <button id="btn1" onclick="show()">click to display</button>

        <!-- task 2 -->

        <p id="para" style="display: flex;">this is my paragraph</p>
        <button id="btn2" onclick="hide()">click to hide</button>

        <!-- task 3 -->

        <p id="para2" style="display: none;">this is my paragraph</p>
        <button id="btn3" onclick="showPara()">click to show</button>

        <!-- task 5 -->

        <input type="text" id="input" onchange="alertMsg()" placeholder="enter user name">

        <!-- task 6 -->

        <input type="password" name="" id="input2" placeholder="enter password" onchange="validate()">

        <!-- task 7 -->

        <input type="text" id="firstName" placeholder="enter first name">
        <input type="text" id="secondName" placeholder="enter second name">
        <div id="name"></div>
        <button id="btn4" onclick="join()">click me</button>

        <!-- task 8 -->

        <h1 id="myName">HII I'm Jo</h1>
        <button id="myButton" onclick="myRole()">click to see my role</button>

        <!-- task 10 -->

        <input type="text" id="formInput" placeholder="please enter text">
        <button id="formButton" onclick="validateForm()">click to check</button>

        <!-- task 11 -->

        <h1 id="showValue"></h1>
        <button id="counterButton" onclick="increase()">click to add</button>


    </center>

    <script>


    // task 1

    const show=()=>{
    let inputHero= document.getElementById("inp1").value
    if(inputHero=="vijay"){

        document.getElementById("h2").innerHTML="<h2>hero name is vijay</h2>"

    }
    }

    // task 2

    const hide=()=>{

        const display=document.getElementById("para")
        if(display.style.display=="flex"){
            display.style.display="none"
        }
        else{
           display.style.display="flex" 
        }
    }


    // task 3

     const showPara =()=>{

        const display=document.getElementById("para2")
        const buttonText=document.getElementById("btn3")
        if(display.style.display=="flex"){
            display.style.display="none"
        }
        else{
           display.style.display="flex" 
           buttonText.innerText="click to hide"
        }
    }

    // task 5

    const alertMsg=()=>{
        const data=document.getElementById("input").value
        if(data==="admin"){
            alert('login success')
        }
        else{
            alert('invalid credential')
        }
    }

    // task 6

    const validate=()=>{
        const pass=document.getElementById("input2").value
        if(pass.length >8 ){
            alert('Strong password')
        }
        else{
            alert('Weak password')
        }
    }

    // task 7

    const join=()=>{
        const fname=document.getElementById("firstName").value
        const sname=document.getElementById("secondName").value
        document.getElementById("name").innerHTML=`<h2> ${fname}   ${sname}</h2>`
    }

    // task 8

    const myRole=()=>{
        
        document.getElementById("myName").innerText ="my role is web developer"
        document.getElementById("myName").style.backgroundColor="lightgreen"
    }


    // task 10

    const validateForm=()=>{
        const formValue=document.getElementById("formInput").value
        if(formValue==""){
            alert('please enter value')
        }
        else{
            alert('form submitted')
        }
    }

    // task 11
    let counter=0
    const increase=()=>{
        counter++
        document.getElementById("showValue").innerText= `the value is :  ${counter}`
    }

    </script>
</body>
</html>
