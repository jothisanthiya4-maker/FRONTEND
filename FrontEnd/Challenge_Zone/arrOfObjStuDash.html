<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center><h1 >Student Mark Dashboard </h1></center>

    <script>
        const students = [
  { id: 1, name: "Ravi", mark: 80 },
  { id: 2, name: "Priya", mark: 95 },
  { id: 3, name: "Arun", mark: 60 },
  { id: 4, name: "Kumar", mark: 30 }
];
    let passed=0
    let failed=0
    let avgArr=[]
    let avgValue=0
    let topper=students[0].mark

    
    for(let i=0;i<students.length;i++){
        if(students[i].mark >40){
            passed+=1
        }
        else{
            failed+=1
        }
    }
    for(let i=0;i<students.length;i++){
        avgArr.push(students[i].mark)
    }
    for(let i in avgArr){
        avgValue+=avgArr[i]
    }
     for(let i=0;i<students.length;i++){
        if(students[i].mark>topper){
            topper=students[i].name
        }
    }
        console.log("Totat students :",students.length);
        console.log("Passed students :", passed);
        console.log("Failed students :",failed);
        console.log("Average mark :", avgValue/students.length);
        console.log("Topper :", topper);
        
        

        
        
        
    </script>
</body>
</html>
