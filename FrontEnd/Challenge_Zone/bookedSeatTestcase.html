<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center><h1 >Find Available Bus Seats </h1></center>
    

    <script>

        let booked=[1, 2, 3, 4, 5, 6, 7, 8]

        let available=[]
        for(let i=1;i<=10;i++){
            
            found= false
            for(let j=0;j<=10;j++){
                if(i==booked[j]){
                    found=true
                }
            }
            if(found==false){
                available.push(i)
            }
        }
        console.log(available)
        
    </script>
</body>
</html>
