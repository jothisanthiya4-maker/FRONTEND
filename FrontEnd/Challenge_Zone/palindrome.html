<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center><h1 >Palindrome </h1></center>

    <script>
        let x="121"
        let reverse=""
        for(let i=x.length -1;i>=0;i--){
            reverse+=x[i]
        }
        if(x==reverse){
            console.log("palindrome");
            
        }
        else{
            console.log("not a palindrome");
            
        }

    </script>
</body>
</html>
